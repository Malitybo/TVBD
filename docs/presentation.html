<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Slides Presentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #presentation-wrapper {
            width: 100vw;
            height: calc(100vh - 40px);
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: calc(100% + 40px);
            border: none;
            display: block;
        }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #000;
            z-index: 1000;
        }

        #refresh-info {
            position: fixed;
            bottom: 8px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 11px;
            z-index: 1001;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #refresh-info:hover {
            opacity: 1;
        }

        #fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 13px;
            z-index: 1001;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #fullscreen-btn:hover {
            opacity: 1;
        }

        /* Show controls on mouse move */
        body.show-controls #fullscreen-btn,
        body.show-controls #refresh-info {
            opacity: 0.6;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    <div id="presentation-wrapper">
        <iframe 
            id="slide-iframe"
            src="https://docs.google.com/presentation/d/e/2PACX-1vRmUyMUw11htw-L4ReAHAySNhPgeNkjrhPMJJZbA9hm13uIfyGXnsWdlhJcxrNiZ16f3GFAQy2WEmsQ/embed?start=true&loop=true&delayms=15000" 
            allowfullscreen="allowfullscreen"
            loading="lazy"
        ></iframe>
    </div>
    <div id="bottom-bar"></div>

    <div id="refresh-info">Auto-refresh: every 5 min</div>

    <script>
        // ============================================================
        // CONFIGURATION - Change these values as needed
        // ============================================================
        
        // Refresh the entire presentation every X minutes
        const REFRESH_INTERVAL_MINUTES = 5;
        
        // Slide auto-advance time in milliseconds (matches the delayms in the embed URL)
        const SLIDE_ADVANCE_MS = 15000;
        
        // Auto-enter fullscreen on page load
        const AUTO_FULLSCREEN = true;
        
        // ============================================================
        // Don't edit below this line
        // ============================================================
        
        // Fullscreen functionality
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const refreshInfo = document.getElementById('refresh-info');
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }
        
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.textContent = '⛶ Exit Fullscreen';
            } else {
                fullscreenBtn.textContent = '⛶ Fullscreen';
            }
        });
        
        if (AUTO_FULLSCREEN) {
            window.addEventListener('load', () => {
                setTimeout(() => {
                    document.documentElement.requestFullscreen().catch(() => {});
                }, 500);
            });
        }
        
        // Hide controls by default, show on mouse move
        let hideControlsTimeout;
        document.addEventListener('mousemove', () => {
            document.body.classList.add('show-controls');
            clearTimeout(hideControlsTimeout);
            hideControlsTimeout = setTimeout(() => {
                document.body.classList.remove('show-controls');
            }, 2000);
        });
        
        const REFRESH_INTERVAL_SECONDS = REFRESH_INTERVAL_MINUTES * 60;
        let countdownValue = REFRESH_INTERVAL_SECONDS;
        
        // Countdown timer
        const countdownInterval = setInterval(() => {
            countdownValue--;
            if (countdownValue <= 0) {
                countdownValue = REFRESH_INTERVAL_SECONDS;
            }
        }, 1000);
        
        // Auto-refresh the iframe
        setInterval(() => {
            const iframe = document.getElementById('slide-iframe');
            iframe.src = iframe.src;
            countdownValue = REFRESH_INTERVAL_SECONDS;
            console.log(`Presentation refreshed at ${new Date().toLocaleTimeString()}`);
        }, REFRESH_INTERVAL_SECONDS * 1000);
    </script>
</body>
</html>
